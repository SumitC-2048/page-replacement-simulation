<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Replacement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="info.html" class="button-link">Go to Information Page</a>

    <div class="container">
        <h1>Page Replacement Algorithm</h1>
        <div class="input">
            <div>
                <label for="frames" >Enter number of frames:</label>
                <input type="number"  value="3" id="frames" placeholder="Number of frames">
            </div>
            <!-- <div>
                <label for="noofPages">Enter number of Pages:</label>
                <input type="number" value="10" id="noofPages" placeholder="Number of pages">
            </div> -->
            <button onclick="insertInput()">Submit</button>
            <div id="pageInput" class="pageInput">
                <label for="inputString">Insert all pages space separated:</label>
                <input type="text" value="1 2 3 2 5 6 2 3 8 9 0" id="inputString" placeholder="Enter pages">


                
            </div>
            <button id="takeInput" onclick="TakeInput()">Take Input</button>

            <div style="margin: 10px;">

                <label for="inputString">upload txt file</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>
        <div id="choice">
            <button onclick="fifo()">FIFO</button>
            <button onclick="lru()">LRU</button>
            <button onclick="opr()">OPR</button>
        </div>

    </div>
    
    <div id="outputblock" >
        <h2>OutPut</h2>
    </div>
    <div id="output">
        <div id="tableContainer"></div>
        <div id="summary"></div>
    </div>
    <button id="reset" onclick="reset()">Reset</button>

    <script src="lru.js"></script>
    <script src="fifo.js"></script>
    <script src="opr.js"></script>
    <script src="input.js"></script>
</body>
</html>
